# ---------------------------------------------------------------------------
# Railway deployment configuration — crash_handler (primary service)
#
# This file configures the crash_handler as the default service deployed
# when using the Railway deploy button. The remaining three agents (qa, dev,
# notifier) can be added as separate services in the Railway dashboard with
# START_COMMAND set to their run command.
#
# Required environment variables (set in Railway dashboard after deploy):
#   ANTHROPIC_API_KEY        Anthropic API key
#   REDIS_URL                Redis connection URL (auto-set by Railway Redis plugin)
#   GITHUB_TOKEN             GitHub PAT with repo scope
#   HELIX_GITHUB_REPO        Repo to fix bugs in (owner/name)
#
# At least one crash source:
#   SENTRY_WEBHOOK_SECRET    Sentry client secret
#   ROLLBAR_ACCESS_TOKEN     Rollbar project read token
#
# Optional:
#   SLACK_BOT_TOKEN          Slack bot token for notifications
#   SLACK_SIGNING_SECRET     Slack signing secret
#   SLACK_APPROVAL_CHANNEL   Slack channel ID for PR approval messages
#   HELIX_PROVIDER           "anthropic" (default) or "ollama"
#   HELIX_MODEL              Model name (default: claude-sonnet-4-6)
# ---------------------------------------------------------------------------

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn agents.crash_handler.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
