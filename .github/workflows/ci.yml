name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest
        env:
          REDIS_URL: redis://localhost:6379
          GITHUB_TOKEN: stub-token-for-ci
          HELIX_GITHUB_REPO: owner/repo
          ANTHROPIC_API_KEY: stub-key-for-ci
